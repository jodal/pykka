version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      docs:
        patterns:
          - "mkdocs*"
      tests:
        patterns:
          - "pytest*"
      linters:
        patterns:
          - "mypy"
          - "basedpyright"
          - "ruff"
          - "ty"
          - "tox*"
          - "zizmor"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
